<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>讀書會報名</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      background: #eaf2f4;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2d6cdf;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>

</head>

<body>

  <div class="card">
    <div class="title">📚 讀書會報名</div>
  </div>

  <div class="card">
    <label>會員姓名</label>
    <input id="memberName" placeholder="請輸入姓名">

```
<label>LINE 名稱</label>
<input id="lineName" placeholder="請輸入 LINE 名稱">

<label>來賓姓名</label>
<input id="guestName" placeholder="沒有可留空">

<label>出席狀態</label>
<select id="attendance">
  <option value="參加">參加</option>
  <option value="不參加">不參加</option>
</select>

<label>原因（不參加才填）</label>
<input id="reason" placeholder="選填">

<button onclick="submitForm()">確認送出</button>
```

  </div>

<script>
const API_URL = "👉這裡之後會換成你的 GAS網址";

async function submitForm() {
  const data = {
    memberName: document.getElementById("memberName").value,
    lineName: document.getElementById("lineName").value,
    guestName: document.getElementById("guestName").value,
    attendance: document.getElementById("attendance").value,
    reason: document.getElementById("reason").value
  };

  if (!data.memberName) {
    alert("請填會員姓名");
    return;
  }

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("報名成功！");
}
</script>

</body>
</html>
